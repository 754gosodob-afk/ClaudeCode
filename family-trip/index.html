<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>우리 가족 여행</title>
<style>
  :root {
    color-scheme: light dark;
    --accent: #e8734a;
    --accent-dark: #d1602f;
    --accent-soft: #fbe4d4;
    --gold: #f0a24f;
    --bg: #fdf6ee;
    --card-bg: #fffbf5;
    --text: #3a2a1e;
    --text-sub: #8a7565;
    --border: #f0e0cd;
    --shadow: rgba(180, 120, 70, 0.14);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #e8734a;
      --accent-dark: #f2916a;
      --accent-soft: #3a2a1e;
      --gold: #f0a24f;
      --bg: #1c1613;
      --card-bg: #26201b;
      --text: #f3e9df;
      --text-sub: #b6a693;
      --border: #3a3129;
      --shadow: rgba(0, 0, 0, 0.35);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  header.topbar {
    background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);
    padding: 2rem 1.2rem 2.4rem;
    border-radius: 0 0 28px 28px;
    box-shadow: 0 6px 20px var(--shadow);
  }
  header.topbar .inner {
    max-width: 720px;
    margin: 0 auto;
  }
  header.topbar .emoji { font-size: 1.8rem; margin-bottom: 0.3rem; }
  header.topbar h1 {
    color: #ffffff;
    font-size: clamp(1.3rem, 5vw, 1.6rem);
    font-weight: 800;
    margin: 0 0 0.35rem;
    text-shadow: 0 1px 6px rgba(0,0,0,0.1);
  }
  header.topbar p {
    color: rgba(255,255,255,0.92);
    font-size: 0.9rem;
    margin: 0;
  }

  .wrap { max-width: 720px; margin: 0 auto; padding: 0 1rem 3rem; }

  nav.tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    gap: 0.5rem;
    padding: 0.9rem 0.15rem;
    margin: -1.2rem -0.15rem 1.2rem;
    background: linear-gradient(var(--bg) 78%, transparent);
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    flex: 1 1 auto;
    min-width: 76px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-size: 0.92rem;
    font-weight: 700;
    padding: 0.75rem 0.6rem;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    box-shadow: 0 2px 6px var(--shadow);
  }
  nav.tabs button:active { transform: scale(0.97); }
  nav.tabs button:hover {
    border-color: var(--accent);
    color: var(--accent-dark);
  }
  nav.tabs button.active {
    background: linear-gradient(135deg, var(--accent), var(--gold));
    border-color: transparent;
    color: #ffffff;
  }

  .panel { display: none; }
  .panel.active { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .day-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.1rem 1.15rem;
    margin-bottom: 0.85rem;
    display: flex;
    gap: 0.9rem;
    box-shadow: 0 3px 10px var(--shadow);
  }
  .day-item .time {
    flex-shrink: 0;
    width: 2.1rem;
    height: 2.1rem;
    border-radius: 50%;
    background: var(--accent-soft);
    color: var(--accent-dark);
    font-weight: 800;
    font-size: 0.95rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .day-item .info { flex: 1; min-width: 0; }
  .day-item .place-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    margin-bottom: 0.3rem;
  }
  .day-item .place {
    font-weight: 700;
    font-size: 1.02rem;
  }
  .day-item .map-link {
    flex-shrink: 0;
    font-size: 0.78rem;
    font-weight: 700;
    color: #ffffff;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    padding: 0.38rem 0.8rem;
    border-radius: 16px;
    text-decoration: none;
    white-space: nowrap;
    transition: filter 0.15s ease;
  }
  .day-item .map-link:hover { filter: brightness(1.08); }
  .day-item .desc {
    font-size: 0.85rem;
    color: var(--text-sub);
    line-height: 1.55;
  }
  .day-item .addr {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin-top: 0.15rem;
  }
  .day-item .photo-frame {
    margin-top: 0.75rem;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .day-item .photo-frame img {
    width: 100%;
    display: block;
  }

  .empty-note {
    text-align: center;
    color: var(--text-sub);
    font-size: 0.9rem;
    padding: 2.8rem 1rem;
    border: 1px dashed var(--border);
    border-radius: 16px;
  }

  .memory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.7rem;
  }
  .memory-grid figure {
    margin: 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 3px 10px var(--shadow);
  }
  .memory-grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }
  .memory-grid figcaption {
    font-size: 0.78rem;
    color: var(--text-sub);
    padding: 0.45rem 0.6rem;
  }

  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 12, 6, 0.9);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 12px;
  }

  footer {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-sub);
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
  }

  @media (max-width: 420px) {
    .day-item { padding: 0.9rem 0.9rem; gap: 0.7rem; }
    .day-item .place { font-size: 0.97rem; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <div class="emoji">🧡🚗</div>
      <h1>우리 가족 여행</h1>
      <p>2026년 7월 30일 ~ 8월 1일</p>
    </div>
  </header>

  <div class="wrap">
    <nav class="tabs">
      <button class="tab-btn active" data-target="day1">1일차</button>
      <button class="tab-btn" data-target="day2">2일차</button>
      <button class="tab-btn" data-target="day3">3일차</button>
      <button class="tab-btn" data-target="memories">추억사진</button>
    </nav>

    <section id="day1" class="panel active"></section>
    <section id="day2" class="panel"></section>
    <section id="day3" class="panel"></section>
    <section id="memories" class="panel"></section>
  </div>

  <footer>가족 여행 일정 · 사진은 여행 중/후에 계속 추가됩니다</footer>

  <div class="lightbox" id="lightbox">
    <img id="lightbox-img" src="" alt="">
  </div>

<script>
// 일정 데이터: time/place/desc/img(선택) 형태로 나중에 채워 넣으면 됩니다.
const days = {
  day1: [
    { time: "1", place: "충주 삼정면옥", mapQuery: "충주 삼정면옥", addr: "충청북도 충주시 관아3길 21" },
    { time: "2", place: "청초수 물회", mapQuery: "청초수물회 속초본점", addr: "강원 속초시 엑스포로 12-36" },
    { time: "3", place: "설악산 케이블카", mapQuery: "설악산 케이블카", addr: "강원특별자치도 속초시 설악산로 1085" },
    { time: "4", place: "속초 카페 휘림", mapQuery: "속초 카페 휘림", addr: "강원특별자치도 속초시 노학동 노리5길 34-1" },
    { time: "5", place: "속초 커피내리는 버스 정류장", mapQuery: "속초 커피내리는버스정류장", addr: "강원특별자치도 속초시 금호동 490-15" },
    { time: "6", place: "모녀 가리비", mapQuery: "속초 모녀가리비", addr: "강원 속초시 대포항희망길 53" },
    { time: "🏠", place: "속초 완벽한날들 (숙소)", mapQuery: "속초 완벽한날들 우렁4길", addr: "강원특별자치도 속초시 우렁4길 50" },
  ],
  day2: [
    { time: "1", place: "속초 김영애할머니 순두부", mapQuery: "속초 김영애할머니순두부", addr: "강원특별자치도 속초시 원암학사평길 183" },
    { time: "2", place: "천진해수욕장", mapQuery: "천진해수욕장", addr: "강원도 고성군 토성면 천진해변길" },
    { time: "3", place: "흰다정", mapQuery: "속초 흰다정", addr: "강원도 속초시 수복로 248" },
    { time: "4", place: "하슬라아트월드", mapQuery: "하슬라아트월드", addr: "강원특별자치도 강릉시 강동면 율곡로 1441" },
    { time: "5", place: "월화거리 야시장", mapQuery: "강릉 월화거리 야시장", addr: "강원 강릉시 금성로 21 (강릉중앙시장 일대)" },
  ],
  day3: [
    { time: "1", place: "대관령 자연휴양림", mapQuery: "국립대관령자연휴양림", addr: "강원 강릉시 성산면 삼포암길 133" },
    { time: "2", place: "쵸딩", mapQuery: "강릉 쵸딩", addr: "강원특별자치도 강릉시 초당순두부길 40" },
    { time: "3", place: "감자바우", mapQuery: "강릉 감자바우", addr: "강원 강릉시 금성로35번길 4" },
    { time: "4", place: "이레담막국수 본점", mapQuery: "원주 이레담막국수 본점", addr: "강원특별자치도 원주시 원문로 336" },
  ],
};

// 추억사진 데이터: { img, caption(선택) } 형태로 나중에 채워 넣으면 됩니다.
const memories = [];

function renderDay(panelId, items) {
  const el = document.getElementById(panelId);
  if (!items.length) {
    el.innerHTML = `<div class="empty-note">아직 등록된 일정이 없습니다</div>`;
    return;
  }
  el.innerHTML = items.map(it => `
    <div class="day-item">
      <div class="time">${it.time || ""}</div>
      <div class="info">
        <div class="place-row">
          <div class="place">${it.place || ""}</div>
          ${it.mapQuery ? `<a class="map-link" href="https://map.naver.com/p/search/${encodeURIComponent(it.mapQuery)}" target="_blank" rel="noopener">지도</a>` : ""}
        </div>
        ${it.addr ? `<div class="addr">${it.addr}</div>` : ""}
        ${it.desc ? `<div class="desc">${it.desc}</div>` : ""}
        ${it.img ? `<div class="photo-frame"><img src="${it.img}" alt="${it.place || ""}" loading="lazy"></div>` : ""}
      </div>
    </div>
  `).join("");
}

function renderMemories() {
  const el = document.getElementById("memories");
  if (!memories.length) {
    el.innerHTML = `<div class="empty-note">아직 등록된 추억 사진이 없습니다</div>`;
    return;
  }
  el.innerHTML = `<div class="memory-grid">${memories.map(m => `
    <figure>
      <img src="${m.img}" alt="${m.caption || ""}" loading="lazy" onclick="openLightbox('${m.img}')">
      ${m.caption ? `<figcaption>${m.caption}</figcaption>` : ""}
    </figure>
  `).join("")}</div>`;
}

function openLightbox(src) {
  document.getElementById("lightbox-img").src = src;
  document.getElementById("lightbox").classList.add("open");
}
document.getElementById("lightbox").addEventListener("click", () => {
  document.getElementById("lightbox").classList.remove("open");
});

renderDay("day1", days.day1);
renderDay("day2", days.day2);
renderDay("day3", days.day3);
renderMemories();

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.target).classList.add("active");
  });
});
</script>
</body>
</html>
