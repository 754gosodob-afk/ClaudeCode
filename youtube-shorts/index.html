<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>유튜브 쇼츠 자막 모음</title>
<style>
  :root {
    color-scheme: light dark;
    --accent: #ff3b30;
    --accent-dark: #d92c22;
    --bg: #f7f7f8;
    --card-bg: #ffffff;
    --text: #1c1c1e;
    --text-sub: #6b6b70;
    --border: #e6e6e8;
    --shadow: rgba(0, 0, 0, 0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121214;
      --card-bg: #1c1c1e;
      --text: #f2f2f3;
      --text-sub: #a0a0a5;
      --border: #2c2c2e;
      --shadow: rgba(0, 0, 0, 0.4);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header.topbar {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    padding: 1.6rem 1.2rem 1.9rem;
  }
  header.topbar .inner { max-width: 720px; margin: 0 auto; }
  header.topbar h1 {
    color: #ffffff;
    font-size: clamp(1.2rem, 5vw, 1.5rem);
    font-weight: 800;
    margin: 0 0 0.3rem;
  }
  header.topbar p {
    color: rgba(255,255,255,0.9);
    font-size: 0.85rem;
    margin: 0;
  }

  .wrap { max-width: 720px; margin: 0 auto; padding: 0 1rem 3rem; }

  nav.tabs {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    gap: 0.5rem;
    padding: 0.9rem 0.15rem;
    margin: 0 -0.15rem 1.2rem;
    background: linear-gradient(var(--bg) 78%, transparent);
    flex-wrap: nowrap;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav.tabs::-webkit-scrollbar { display: none; }
  nav.tabs button {
    flex: 1 1 auto;
    min-width: 100px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-sub);
    font-size: 0.92rem;
    font-weight: 700;
    padding: 0.75rem 0.6rem;
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    box-shadow: 0 2px 6px var(--shadow);
    white-space: nowrap;
  }
  nav.tabs button:active { transform: scale(0.97); }
  nav.tabs button:hover {
    border-color: var(--accent);
    color: var(--accent-dark);
  }
  nav.tabs button.active {
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-color: transparent;
    color: #ffffff;
  }

  .channel-panel { display: none; }
  .channel-panel.active { display: block; animation: fadein 0.25s ease; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channel-meta {
    font-size: 0.8rem;
    color: var(--text-sub);
    margin: 0 0 0.9rem;
    word-break: break-all;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 1rem;
    overflow: hidden;
    box-shadow: 0 3px 10px var(--shadow);
  }
  .card .thumb-link { display: block; position: relative; background: #000; }
  .card .thumb-link img {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    display: block;
  }
  .card .play-badge {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .card .body { padding: 0.9rem 1rem 1.05rem; }
  .card .title {
    font-weight: 700;
    font-size: 0.98rem;
    margin: 0 0 0.5rem;
    line-height: 1.4;
  }
  .card .open-link {
    display: inline-block;
    font-size: 0.78rem;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    padding: 0.35rem 0.75rem;
    border-radius: 14px;
    text-decoration: none;
    margin-bottom: 0.7rem;
  }
  .card .transcript-label {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text-sub);
    margin-bottom: 0.3rem;
  }
  .card .transcript-label .badge {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--accent-dark);
    background: var(--border);
    border-radius: 8px;
    padding: 0.1rem 0.4rem;
    margin-left: 0.35rem;
  }
  .card .transcript {
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
  }

  footer {
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-sub);
    padding-bottom: calc(2rem + env(safe-area-inset-bottom));
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="inner">
      <h1>유튜브 쇼츠 자막 모음</h1>
      <p>채널별 최근 쇼츠 · 자막 텍스트 정리</p>
    </div>
  </header>

  <div class="wrap">
    <nav class="tabs" id="tabs"></nav>
    <div id="panels"></div>
  </div>

  <footer>yt-dlp로 수집한 자동 자막 기반이며 일부 오타/오역이 있을 수 있습니다</footer>

<script>
// 채널을 추가하려면 이 배열에 { id, label, handle, translated(선택), shorts } 형태로 객체를 추가하면 됩니다.
const channels = [
  {
    id: "chesleytv",
    label: "체슬리",
    handle: "youtube.com/@chesleytv",
    shorts: [
      { id: "3akKt2wZsdg", title: "Good companies are now at a good price #ParkSeIk", transcript: "기업을 보면서 기업의 가치 대비 지금 주가가 싼지 비싼지 혹은 얼마나 거품이 만들어졌는지 그게 이제 판단의 기준이 돼야 되지 이 전쟁 때문에 주가가 빠지는 이런 걸로 어 좋은 가격이 된 거잖아요. 투자이 이제 좋은 가격일 때 파시면 안 되고 투자이 나쁜 가격에 사면 안 되고 항상 주가는 좋은 가격이고 나쁜 가격이 있다. 그렇게 생각하시면 좋을 것 같습니다. 우리가 항상 좋은 기업만 투자하면 되잖아요. 나쁜 기업도 있습니다. 근데 좋은 기업에 투자하는데 반드시 좋은 기업의 주가가 좋은 가격은 아닐 수 있다는 거 기억을 꼭 하셔야 됩니다." },
      { id: "lwV44naSpIQ", title: "If you're stuck in a slump, here comes your chance to escape #ParkSeIk", transcript: "신규 메모리 상장이 메모리 주식에는 일시적으로 분명히 영향을 주는 거고 이게 끝나고 상장이 되고 한 2주 정도는 돼야 제대로 이제 가격이 형성된다라고. 이번 메모리 반도체의 주가 조정도 거의 이제 끝나지 않을까? 그러고 나서 3분기 실적 시즌으로 들어가는 9월 10월 정도 되면 가파르게 반등이 들어오면서 모건스탠리의 리포트가 항상 그 선방을 빨리 때린다잖아요. 선방을 빨리 때리는데 실적이 계속 밀고 올라오기 때문에 항상 오른쪽 어깨를 만들어 준다. 여기서 물리신 분들은 결국 시간이 해결해 주는데 한 3개월..." },
      { id: "4zD4oTWSAFY", title: "Frustrated by the volatile stock market? #ParkSeIk", transcript: "시장이 또 요동을 친다 그죠? 비발디의 사계 여름을 말씀드리면서 처음에는 지루하게 늘어지는 여름의 그런 장면들이 묘사되다가 2학장 3학장으로 가면 소나기가 나오고 폭붕어가 모르치는 그런 장면들이 막 나오지 않습니까? 그죠? 그러면서 주식 시장도 봄여름 가울이 있고 어 뜨거운 여름에도 그렇게 보구가 쏟아지고 천둥 번개가 치는 예 그런 장면들이 나오듯이 이런 변동성이 다 주식 시장의 속성입니다. 이런 거에 어 익숙해지셔야 되고 어 지나고 나면서 이런 변동성이 항상 있을 수가 있는데 이럴 때는 나는 어떻게 대응했어야 되는가 예 거기에 대한 부분을 정리를 해 보셔야 됩니다. 예. 그래서 이번에 시장이 어떻게 되는지 그 결과까지 한번 보시면서 이번 7, 8, 9월 달 지나고 나서 한 분기를 마무리하실 때 그때 백서 같은 거 한번 또 적어 보면 그게 다 실력이 될 겁니다." },
      { id: "OjkjFk6aYGI", title: "This is the best thing to do when volatility is high #ParkSeIk", transcript: "주식 투자라는게 봄여름론 가을 겨울이 있고 그서 강세장 속에서도 언제든지 지금 시장이 고점 대비 벌써 16% 빠졌더라고요. 원래는 제가 1년에 과거 사례를 보면서 몇 년도에도 두 세 번의 조정이 있다고 그 강세장 속에서도 두 세 번의 조정은 항상 겪고 간다 그런 말씀을 드렸는데 최근에는 보니까 ETF 거기다가 레버리지 두 배짜리 이런게 많아져서 아 변동성이 좀 더 심하구나 그래서 변동 폭을 좀 더 넓게 잡고 있습니다. 주식 투자의 그런 변동성을 겪는 것도 아 주식의 어 일부다. 투자의 속성 중에 하나다. 작년한 거다라고 생각하시면서 어 변동성이 심할 때는 안 보고 있었니다." },
      { id: "OK68TEn9CJU", title: "If You Don't Know This, You'll Go Crazy #ParkSeik", transcript: "거의 대부분의 주식이 -40%가 있잖아. 그래서 앞으로 먹을게 너무 많다. 제가 봤을 때는 평당 7,000으로 가야 될 주식들이 지금 평당 3,000으로 오히려 빠져 있으니까. 그게 이제 밸류에이션 관점으로 쳐다보면 그런 것들이 보이는데 그냥 주가 흐름만이나 이런 걸로 보는 분들은 반도체 끝나면 다 끝나는 거야. 이렇게 얘기하시거든. 그렇지 않다는 거죠. 그래서 이 반도체가 쉬니까 막 튀어오르잖아요. 왜 막 튀어오르냐면 평당 7천 가야 되는데 지금 평당 3천 오히려 빠져 있어요. 그래서 제가 주식이 너무 좋다는 거죠. 근데 이걸 이해하지 못하면 돌아버리는 거죠. 말대로 돌아버리는 거예요. 도대체 내 주식만 왜 이래? 그걸 이해하지 못하고 막 신용 쓰고 있는 사람들 반대 매매 당하고 말 그대로 돌아버리 그걸 어 이해를 하시고 투자를 하시면 우리가 조금 조금씩 주식적에 대해서 좀 그 속성을 이해를 하시면 주식으로 돈 벌 수 있는게 너무 많습니다." },
      { id: "sJxf6HoOSE4", title: "How to Start Learning About Stocks and Economics #ParkSeik", transcript: "대학생 아들이 있는 엄마입니다. 저희 아들이 경제 주식을 전혀 모르고 관심도 없어서 걱정입니다. 경제 초보자가 읽으면 도움될 수 있는 책 추천 부탁드려요. 그 일단은 돈을 꽂아서 주식을 사 줘야 거기서부터 이제 관심이 생깁니다. 관심을 가지게 되면 사실 좀 책이 재밌어야 되는데 주식도 안 하는데 주식책 피터 린치의 월가의 영웅 이런 책 보면 그거는 못 볼 거야. 그래서 여기 주식으로 부자됩시다. 일단 제목부터가 주식으로 부자된다고 진짜. 그러면 왜 주식을 해야 되는지 첫장부터 나오죠. 인플레이션이라는 것 때문에 저금리 시대로 들어갔기 때문에 주식을 안 하면 안 됩니다. 그죠? 그런 것들이 쭉 적혀 있으니까 주식으로 부자됩시다." },
      { id: "IqbSQCOFYN4", title: "The rally begins once the inflection point ends #ParkSeIk", transcript: "어, 주식 시장이 뭔가 바뀐다라는 거 제일 싫어하잖아요. 거기에 대한 이제 선반영을 좀 하고요. 그리고 지금 중앙은행에 금리 세 번, 작년에도 세 번, 올해도 낮추나 했는데 뭐야? 올해 올려야 된다고. 지금 이런 말들이 나오다 보니까 그런 거에서 다 변동성이 생기는 거거든요. 그 변동성을 바다에 가시면 어 썰물 밀물이 바뀔 때 파도가 부딪히면서 막 이러잖아요. 딱 그 장면을 연상하시면 됩니다. 항상 변곡점에서는 변동성이 커진다. 그래서 위에서 변곡점도 마찬가지고요. 바닥에서 돌 때도 똑같습니다. 바닥에서 보면 밑꼬리 쫙 나오고 올라가고 뭐 장대 양봉 나고 이런게 많아지잖아요. 작년 4월에도 차트 보면 변동성 엄청 큽니다. 그래서 그 변동성이 되게 크게 나타날 때 오히려 어 이제 변곡점이구나 저는 그런 생각을 좀 하거든요. 그래서 그 금리 정책이 변하는 거 아닌가라고 했다가 오히려 8, 9월 되면 물가가 다시 쭉 빠지면서 금리를 올려야 되는 상황 아니네 이러면서 다시 시장이 안도랠리가 펼쳐질 거라고 생각합니다." },
      { id: "hmRawtR_ClI", title: "This Trading Strategy Is the Most Comfortable #ParkSeIk", transcript: "확률적으로 또 손실은 짧게 수익은 길게 하려면 이게 추세 추종 전략을 써야 되는데 추세가 없는 구간이 있거든요. 왔다 갔다. 이 왔다 갔다 하는 구간에서 닥질해야 됩니다. 아까 뭐 10%면 자르고 올라가니까 다시 매수 신호가 나오니까 또 들어갔다가 또 떨어지면 자르고 그래서 그걸 갖다가 그냥 기계적으로 짧은 손실을 무한 반복하더라도 그걸 견뎌낼 수 있어야 되는데 그게 생각처럼 쉽지는 않습니다. 그래서 저도 이 시스템 트레이딩의 추세 추종 전략을 해 보면 그렇게 제 성격이도 좀 맞지 않고요. 우리가 이제 추세를 먹는 건 중요한 건데 결국은 밸류에이션을 잣대로 투자를 하는게 제일 속편하더라고요. 그 밸류에이션 대비 너무 싼 영역에서는 모으고 그러고 나서 적정 가치를 회복하고 더 올라갔을 때 좀 과하다 싶을 때는 팔고 근데 그게 일반 가치 투자자들처럼 이익 모멘텀이 없을 때 들어가는 거는 그거는 속지죠." },
      { id: "d4OZOd6SBgg", title: "You Must Do This When Investing in Stocks #ParkSeik", transcript: "근데 가치 평가는 어떻게 보면 기업이 이게 가격이 적당한게 맞는가? 이 부분은 늘 고민하셔야 되거든요. 그래서 5, 60대 여성분들이 주식 투자 수익률이 좋잖아요. 왜냐면 마트 가서 이제 장 보시면서 항상 이 가치 대비 이 가격이 맞는지를 늘 비교하는 습관이 돼 있다는 거죠. 그런데 20대 남자의 수익률이 제일 안 좋잖아요. 가치 평가라는 기준 없이 오르고 내리는 거 맞추려고 하다 보니까 20대들이 남자가 얼마나 순발력이 좋겠습니까? 그래서 수익이 제일 안 좋은게 그 답이 나오는 거거든요. 주식 투자를 어떻게 해야 되는지 오르고 내려 이런 거 막 맞추는게 아니라 제일 중요한 거는 결국은 가치 평가예요. 가치 평가." },
      { id: "Guwgxyi7lgc", title: "This is when you're in the most danger #ParkSeIk", transcript: "빅쇼트 영화의 딱 첫 장면에 마크트웨인의 글이 나옵니다. 우리를 곤경에 빠뜨리는 것은 우리가 뭔가를 몰라서가 아니라 뭔가를 내가 확신하고 있었는데 그게 사실이 아닐 때 우리가 곤경에 빠진다는 거죠. 3년 전에 2차전지도 그랬고 21년도에 삼성전자 9만원대 나왔던 리포트도 그랬고 그 리포트의 내용을 맹신하고 샀는데 그 리포트 내용대로 안 됐잖아요. 근데 그 베스트 애널리스트시거든요. 저랑도 친하고 존경하는 분인데 그런 베스트 애널리스트조차도 내년 내후년 실적에 대해서 정확하게 측정을 하기가 어렵다는 거죠. 그래서 항상 미래의 스토리나 미래의 실적을 늘 의심하면서 봐야 된다는 거죠. 너무 확신하고 있을 때 항상 곤경에 빠진다라고 보시면 됩니다." },
      { id: "eJWiCw3qGWs", title: "Whether it's Quant or anything else, you have to repeat this to make money #ParkSeIk", transcript: "한 전략만 이렇게 따라하시는 거는 좀 위험할 수가 있습니다. 어떤 때는 안 맞을 때도 있고 이 퀀트라는게 100% 전략은 없거든요. 그래서 강환국이 확률이 높은 아, 이런게 이런게 확률이 높다. 예를 들면 강환국이 예전에 할로윈 전략을 소개해 줬을 때 그런 할로윈 전략이 10월 말에 들어가서 오래 파는 전략인데 그런게 글로벌하게 상당히 어 잘 먹히는 전략입니다. 근데 100% 매년 그런 건 아니잖아요. 매년 그런 거면 누가 이 5월 10월 소위 지역이라고 하는 이 5월 10월에 투자하겠습니까? 10월만 투자해서 4월까지만 그 전략만 하면 되는데 거기에 이제 저 같은 경우에는 이걸 홀수 짝수로 구분해서 보면 그 전략이 더더욱이 파워풀해지죠. 근데 그렇다고 해서 또 100% 맞는 건 아닙니다. 그래서 강환국처럼 여러 가지 전략을 섞어서 투자를 하실 필요가 있습니다. 그렇게 확률이 높은 방법으로 계속 반복하다 보면 결국은 돈을 벌게 됩니다." },
      { id: "dnb54s4j9m4", title: "Common Traits of People Who Made It Big in the Stock Market #ParkSeIk", transcript: "그리고 제 주변에 좀 큰 돈 보신 분들의 공통된 특징이 뭐 반지하에서 살았다. 뭐 마포대교 한 두 번은 갔다 왔다. 지금 주식으로 크게 성공한 분들 전부 다 보면 뼈아픈 경험이 있었거든요. 아픈 경험 없이 처음 시작했는데 저 많이 벌었어요. 그게 초심자의 행운 뭐 도박판도 그렇고 어디서나 비슷합니다. 처음에 딱 시작했는데 오 잘되면 겁이 없어지고 그러다가 나중에 크게 투자를 했을 때 한 방에 큰 손실이 나기 때문에 오히려 처음에 버는 것보다 지금처럼 뼈가 녹네요 하고 고생한 경험을 하신게 저는 훨씬 더 다행이라고 생각합니다. 저도 예전에 일식집 한번 투자했다가 강북 아파트 한채 날리고 옵션도 처음에 내가 옵션 실전 매매를 안 해보고 고객 자산 관리를 하는게 맞나 해서 5천 놓고 시작해 가지고 3개월 만에 그게 한 300만 원 남았을 거예요. 그래서 이 뼈아픈 경험을 해서 그 이후로 나중에 선물로 그거 뭐 10배 이상 되는 복수를 하긴 했었지만 처음에 그런 손실을 기록을 하신 경우에 큰 수익을 만드시는 발판이 될 거다라고 생각합니다." },

    shorts: [
      { id: "dHuUfGXgJJk", title: "“주식을 영원히 보유한다는 말은..” #워런버핏 #찰리멍거", translated: true, transcript: "워렌, 올해 연례 서한에서 눈에 띄었던 문구가 있는데, 주식을 영원히 보유하는 게 아니라는 점을 명확히 하신 부분이었어요. \"우리가 주식을 영원히 보유한다고 말하는 사람들이 있는데, 그렇지 않다\"는 짧은 문단을 넣으셨죠. 왜 올해 그 내용을 넣으셨나요? 사실 보고서에는 30여 년 전부터 있던 문구인데, 아무리 좋은 가격을 제안받아도 사업을 팔지 않겠다는 내용입니다. 다만 그 사업이 영원히 현금을 까먹을 것으로 보이거나 심각한 노사 문제가 있을 경우에는 매각을 고려할 수 있다고 되어 있었어요. 어떤 사업에 대해 제값보다 훨씬 높은 가격을 제안받았을 때도 관심 없다고 말한 적이 있는데, 사람들이 이걸 주식에도 적용된다고 해석했더군요. 실제로 우리 이사 중 한 명도 그렇게 해석했어요. 하지만 사실 우리는 주식을 계속 사고팔고 있고, 우리가 가장 좋아하는 보유 기간은 '영원히'입니다. 그런 주식을 찾을 수 있으면 좋겠죠. 저는 버크셔를 52년째 보유하고 있고, 제 가족들도 마찬가지입니다. 하지만 우리는 어떤 주식이든 영원히 보유하겠다고 약속하지는 않습니다. 다만 누군가 자신의 사업을 우리에게 팔면, 우리는 그 사업을 계속 유지하겠다고 약속합니다. 되팔지 않겠다는 거죠. 우리는 사모펀드가 아니니까요. 실망스러운 성과를 내더라도 앞서 말한 두 가지 경우가 아니면 계속 보유합니다. 그런데 이른바 '기본 원칙' 중 그 한 문단이 모호했다는 게 우리 이사 한 명의 반응으로 드러났으니, 명확히 해두는 게 낫겠다고 생각했습니다. 그럼 웰스파고나 코카콜라, 아메리칸 익스프레스처럼 영원히 보유해온 것처럼 보이는 초장기 보유 종목들을 팔 수도 있다는 뜻인가요? 그것들을 팔 생각은 없습니다. 다만 세상에서 가장 좋은 거래가 나타난다면 모르죠. 스스로 매각 금지를 정해둔 건 아니니까요. 팔 계획은 없지만, 이전에 명확하지 않았던 그 한 가지만 정리해두고 싶었습니다. 멍거 씨께 드리는 질문인데, 최근 몇 달간 내부자 매매 내역을 보니 버크셔 주식을 꾸준히 매도하고 계시더군요. 최근 몇 년간 버크셔 주식을 상당량 기부했고, 일부는 매각하기도 했습니다. 기부한 건 그게 올바른 행동이라고 생각해서였고, 매각한 건 그 돈을 쓸 곳이 있어서였습니다." },
      { id: "1tAkLmqrUFk", title: "“파산을 자랑하는 사업가” #워런버핏 #찰리멍거", transcript: "도널드 트럼프는 미국 국민들에게 이렇게 말했습니다. \"저와 함께 하세요. 아시다시피 저는 승자입니다. 제 회사인 트럼프 호텔 앤 카지노 리조트에 투자하세요. 이제 여러분도 이 위대한 사업가와 함께 투자할 기회를 얻었습니다.\" 그때가 1995년이었죠. 그들은 뉴욕 증권 거래소에 상장했고, 트럼프 씨는 아주 겸손하게도 종목 코드로 DJT를 정했습니다. 저게 무슨 용도인지 맞춰보세요! 그 회사는 향후 10년 동안 매년, 단 한 해도 빠짐없이 손실을 볼 것입니다. 그는 그 기간 동안 4400만 달러의 보상을 받았습니다. 만약 그가 1995년에 이 회사를 제안했을 때, 원숭이가 주식 시장에 다트를 던졌다면 평균적으로 150%의 수익을 올렸을 겁니다. 하지만 그를 믿고 그의 유혹적인 말에 넘어간 사람들은 투자금의 90% 이상을 날렸습니다. 10센트도 채 돌려받지 못했죠. 그리고 그는 돈을 빌려 사업을 운영하다가 번번이 파산했잖아요. 저는 파산 경험을 자랑하는 사업가를 본 적이 없습니다. 도널드 트럼프는 훌륭한 대통령이 될 수 있을까요? 글쎄, 그는 꽤 결단력이 있을지도 몰라요. 하지만 제가 도널드 트럼프를 어떤 분야의 이상적인 의사 결정자나 관리자라고 생각하나요? 답은 '아니오'입니다. 제가 미국 대통령으로 가장 원하지 않는 사람은 도널드 트럼프입니다. 왜냐고요? 제 생각에는 그는 그 직책에 적합하지 않은 자질을 가지고 있는 것 같습니다. 헛된 영광, 과장된 표현이 지나치게 많다는 거죠." },
      { id: "7ZzM-u1R0Ac", title: "“그는 해외 투자를 어떻게 하는가?” #앨리스슈뢰더 #스노볼", transcript: "정말 좋은 질문입니다. 그는 어떻게 해외 투자를 하나요? 왜냐하면 그는 국제 투자 경험이 거의 없었기 때문입니다. 제가 이 책 작업을 시작했을 때, 그는 그 분야에서 본격적으로 활동을 확장하기 시작하던 시기였습니다. 그는 자신이 무엇을 할 수 있는지에 대한 확신을 가지고 있고, 남보다 아는 것이 더 많지 않다면 투자해서는 안 된다고 생각합니다. 기술을 이해하지 못하기 때문에 기술 분야에 투자하지 않는다고들 하는데, 사실 그는 기술을 아주 잘 이해하고 있습니다. 다만 당신들만큼 잘 이해하지 못하고, 카지노에 가서 당신들을 상대로 내기를 걸지도 않을 거라는 거죠. 그래서 그는 미국 비즈니스에 관한 모든 것을 꿰뚫고 있고, 점차 그 범위를 다른 나라들로 넓혀왔습니다. 미국에서 하던 것과 똑같이 폭넓게 읽고 공부하며 지식을 쌓아 미국 밖 투자에도 점점 익숙해졌죠. 제가 이 책을 작업하는 동안 그는 한국에 투자를 시작했는데, 정말 흥미로웠어요. 한국 경제가 몇 년 전 어려움을 겪었다가 이후 개선되었다는 걸 신문 기사로 읽고는, 한국 주식 시세를 확인해봤더니 경제는 괜찮은데 주가는 낮게 거래되고 있더라는 거죠. 그래서 증권사를 통해 한국 주식 관련 서적을 구해 예전 무디스 매뉴얼 보듯 공부했는데, 한국 회계 방식이 미국과 달라 이해가 필요하다는 걸 깨닫고 다른 책으로 독학까지 했습니다. 수많은 한국 기업에 전화를 돌려 정보를 모으고 20개 정도로 목록을 좁혔고, 미국 시민권자로서는 매우 어려운 한국 증권 계좌 개설 방법까지 알아내 결국 한국 주식을 대량 매수해서 큰돈을 벌었습니다. 이건 개인 투자였고요. 지금도 그는 분명 다른 무언가를 보고 있을 겁니다. 다른 사람들이 알아채지 못하고 읽지 않고 연구하지 않는 것들을 살펴보고 있을 뿐이죠." },
      { id: "lCsSEhxlcRY", title: "“가장 재밌었던 투자” #워런버핏", transcript: "지금까지 했던 개인 투자 중 가장 흥미롭거나 재미있었던 건 뭔가요? 돈을 많이 벌면 언제나 더 재밌죠. 한번은 애틀드(Atled Corp.)라는 회사 주식을 한 주 샀어요. 발행 주식 수가 98주였는데 제가 한 주를 산 거죠. 그게 바로 유동성 있는 증권이라는 겁니다. Atled는 Delta를 거꾸로 쓴 단어였는데, 세인트루이스에 사는 100명의 남자들이 각자 50~100달러씩 모아서 루이지애나에 오리 사냥 클럽을 만들고 땅을 산 거였어요. 그런 아이디어는 100개나 있었는데, 그중 두 명이 100달러를 내지 못해서 총 98주만 거래된 거죠. 그들은 루이지애나로 내려가 오리를 몇 마리 쏘았는데, 누군가 땅에 총을 쐈더니 기름이 솟구쳐 나왔다고 하더군요. 40년 전에 제가 주당 29,200달러에 그 주식을 샀는데, 만약 계속 보유했다면 주당 200만~300만 달러 가치가 됐을 텐데 결국 다른 석유 회사에 팔아버렸어요. 사실 그때 현금이 없어서 은행에서 돈을 빌리고 아내한테도 돈을 빌려서 샀는데, 대출 담당자가 \"산탄총도 사려고 돈 좀 빌리시겠어요?\"라고 묻더군요." },
      { id: "gKKcjMryB0o", title: "“멀티플도 높은데 기업분할하시죠.” #워런버핏 #찰리멍거", transcript: "이런 시기에 파트너십 가치를 높이는 차원에서, 각 사업부를 별도 회사로 분사하는 방안을 고려해 본 적이 있나요? 일부 회사들은 버크셔가 현재 누리는 것보다 더 높은 주가순자산비율로 매각될 가능성이 있을 텐데요. 아니요, 저희는 어떤 회사도 분사시키지 않을 겁니다. 누군가 와서 \"당신은 X배수를 가지고 있는데 이 자회사는 그 1.5배가 될 거다, 그러니 분사시키면 당장 이득\"이라고 말해도 우리는 전혀 관심이 없습니다. 시장 가치가 한 달 만에 급등하는 그런 걸 찾는 게 아니거든요. 우리는 훌륭한 사업을 하고 있고 그걸 버크셔 안에서 계속 이어가고 싶습니다. 버크셔에는 세금 문제 없이 자금을 다른 투자 기회로 이동시킬 수 있는 큰 장점이 있는데, 씨즈캔디처럼 훌륭한 사업이라도 그 자본을 효율적으로 활용할 수 없다면 다른 사업으로 옮기거나 다른 회사를 인수하는 데 쓸 수 있죠. 이런 자본 배분의 이점은 주주 개인이 세금 효율적으로 하기 어려운 부분입니다. 게다가 개인으로부터 사업체를 인수할 때 우리는 장기적으로 보유하겠다는 약속을 하고, 실제로 그 약속을 지킵니다. 결혼 생활처럼 오래 지속되는 거죠. 분사가 그렇게 많이 일어나는 이유는 시가총액이 조금 더 높아 보이기 때문이고, 월스트리트는 수수료를 받기 위해 그런 걸 팝니다. 투자은행가들의 그런 프레젠테이션을 수년간 들어왔는데, 결국 한 가지 확실한 건 그런 일에는 항상 수수료가 따른다는 겁니다." },
      { id: "DoaRbu7Yak4", title: "“PER 50~60배에도 영구 보유??” #워런버핏 #찰리멍거", translated: true, transcript: "버크셔는 이른바 '영구 보유'라고 부르는 여러 회사의 주식을 보유하고 있습니다. 70년대 초에는 우량주들이 PER 50~60배에 거래되던 '2단계 시장(two-tier market)'이 있었는데, 만약 그런 상황이 다시 온다면 버크셔가 보유한 회사들도 여전히 영구 보유 대상일까요, 아니면 어떤 가격에도 팔 수 있는 걸까요? 저희가 '어떤 가격에도 팔지 않는다'고 생각하는 것들이 있고, 실제로 시험받은 적도 있지만 팔지 않았습니다. 우리는 사업과 사람이 모두 마음에 드는 회사를 파는 걸 정말 꺼립니다. 이른바 '2단계 시장'은 여러 문제를 일으켰는데, 실제로는 1군이 아닌데 한때 1군으로 분류됐던 회사들이 많았기 때문입니다. 그 회사에 대한 판단이 맞다면 상당히 높은 가치로도 보유할 수 있고, 그만큼 좋은 사업을 다시 찾기 어렵다면 매우 높은 수준에서도 보유할 수 있습니다. 그러면 같은 사업을 훨씬 싼 값에 다시 살 기회가 올지, 아니면 거의 비슷하게 좋은 걸 훨씬 싼 값에 살 수 있을지가 문제가 되는데, 우리는 그런 걸 잘한다고 생각하지 않습니다. 그보다는 그냥 그 사업을 계속 보유하면서 마치 주식시장이 존재하지 않는 것처럼 대하는 편을 택합니다. 실제로 그 방식이 20~25년 전에 제가 예상했던 것보다 훨씬 더 좋은 결과를 가져다줬습니다. 그런 태도에서 정말 예상 못했던 좋은 운도 상당히 따라왔다고 생각합니다." },
      { id: "a7tSQ4VfgAU", title: "“평범한 개인의 손쉬운 가늠자” #워런버핏 #찰리멍거", transcript: "자본 재배치 측면에서, 코카콜라가 그렇게 훌륭한 투자처이고 그렇게 많은 수익을 안겨줬다면, 왜 그 자본의 일부를 코카콜라 주식을 추가로 매입하는 데 재투자하지 않는 겁니까? 우리는 작년에 더 많이 구매했는데, 다른 품목 구매와 비교하는 기준이 될 수 있습니다. 다른 업체를 고려한다면 '왜 코카콜라를 더 사는 대신 다른 걸 사야 할까'를 자문해 보는 거죠. 이건 사실상 모든 투자자에게 매우 유용한 말인데, 일반인에게 가장 쉽게 구할 수 있는 건 바로 자신의 기준을 측정하는 잣대입니다. 새로운 것이 이미 알고 있는 것보다 낫지 않다면, 눈앞에 보이는 것의 99%를 걸러내게 됩니다. 이건 엄청난 사고의 낭비를 막는 거고, 대체로 경영대학원에서는 가르치지 않는 내용입니다. 그래서 대형 기관들이 남들이 다 하니까 자기 자금의 4%를 해외 주식에, 3%를 신흥 성장국에 투자하는 식으로 결정하는 걸 보면 좀 어이가 없습니다. 그들은 의도적으로 상대방이 가진 최고의 정신적 도구를 빼앗는 기술을 쓰고 있는 셈이죠. 그러면서 정작 경영대학원에서는 아이들에게 그런 걸 가르치고 있고요. 핵심은 무언가를 할지 말지 결정할 때 자신이 가진 최고의 기회와 비교해 보라는 겁니다. 더 좋은 약이 있는데도 복용하지 않는다면, 왜 그런 일을 하려는 건가요? 누군가 해외 주식에 2%를 투자해야 한다고 말한다고 해서 무조건 그렇게 할 필요는 없습니다." },
      { id: "ASFOU1Gv8ao", title: "“한 종목이 다했다. 인생도 그런 거다.” #워런버핏 #찰리멍거", transcript: "벤 그레이엄에 대해 정말 흥미로운 점 하나는, 그는 정말 재능 있는 교사였고 교직은 매우 존경받는 직업이라는 겁니다. 하지만 벤 그레이엄이 노년에 다소 쑥스러워했던 흥미로운 사실은, 그의 평생 투자 수익의 절반 이상이 단 하나의 주식, 그것도 성장주인 가이코 인수 지분에서 나왔다는 점입니다. 그가 활동하던 당시에는 형편없는 회사들이 너무 싸게 나와서 이 회사 저 회사 옮겨 다니며 약간의 돈을 벌 기회가 많았지만, 정작 그가 큰돈을 번 건 성장주 하나 덕분이었죠. 저평가된 우량 기업 하나를 인수하는 건 매우 좋은 일이고, 버크셔도 이를 수없이 경험했습니다. 벤은 판본 후기에서 그 사실을 지적하고 인정하면서도 몇 가지 좋은 교훈을 얻었다고 했는데, 인생이란 그런 거라고, 준비를 잘하면 도중에 모든 걸 잃지 않고 좋은 일이 생긴다고 말했습니다. 찰리와 저는 그걸 우리 삶에서 직접 경험했어요. 준비된 마음가짐, 필요할 때 행동할 의지, 그리고 세상 모든 세일즈맨의 말을 무시할 의지 같은 것들이죠. 그런 한두 가지가 올바른 결정을 내리는 데 도움이 됩니다. 가장 중요한 건 상황을 꼼꼼히 생각하고 어리석은 짓을 너무 많이 하지 않으려고 계속 노력하는 거예요. 그러면 조만간 좋은 결과를 얻게 됩니다." },
      { id: "oTZ_NZh-A5w", title: "'실용주의' #워런버핏 #찰리멍거", transcript: "이건 아주 심오한 철학적 질문이네요. 당신과 찰리가 하는 일과 설교하는 많은 것들이 사람들이 실제로 행하고 기대하는 것과는 정반대입니다. 인수 대상 회사의 경영진을 교체하지 않고, 오랜 기간 근무한 직원들을 칭찬하는 반면 다른 회사들은 항상 새 인재를 찾고 나이든 직원을 내보내려 하죠. 퇴직을 장려하지 않고, 이사들에게 과도한 보수나 주식옵션도 지급하지 않고, MBA 출신을 많이 채용하지도 않습니다. 첨단 기술에 투자하지 않지만 회사는 매우 빠르게 성장했고, 수익 가이드라인도 제공하지 않고, 뉴욕 근처에 살지도 않고, 초밥도 안 좋아하시죠. 이 모든 일의 근본적인 이유가 뭔지 궁금합니다. 통일된 핵심 철학이 있는 것 같은데, 그게 뭔가요? 불교인가요, 다른 종교인가요? 한번 말씀드리면, 그건 실용주의입니다. 우리가 각기 다른 방식으로 일하는 이유 중 하나는 그게 우리에게 맞기 때문이에요. 우리 기질과 본성에 잘 맞고, 경험을 통해 그게 더 효과적이라는 걸 알았기 때문이기도 하고요. 지금까지 잘 작동해온 걸 계속 유지하는 게 현명하다고 봅니다. 효과가 있는 걸 반복하는 거죠. 종교에 대해서는, 저는 완전한 불가지론자이고 종교적인 가정에서 자랐습니다. 다른 사람의 종교에 대해서는 아무 의견이 없어요. 그게 바로 불가지론자의 본질이니까요. 모두 각자의 분야에서 잘 되기를 바랍니다." },
      { id: "vrKeh28f98k", title: "“한국은 일본보다 빠르게..”", translated: true, transcript: "한국 시장에 대해 정말 그렇게 확신할 수 있을까요? 저는 지금 그 확신 쪽으로 기울고 있는데, 처음의 흥분과 함께 십여 년 전 일본에 대해 있었던 뿌리 깊은 회의론도 기억하고 있고, 지금 일본이 어떻게 됐는지 보면 알 수 있죠. 한국은 그만큼(10년) 걸리지 않을 거라고 봅니다. 코리아 디스카운트를 줄이고 경우에 따라 코리아 프리미엄으로 바꾸려는 정부의 의지는 진심입니다. 한국이 더 빠를 거라고 보는 가장 큰 이유는, 한국은 일본을 보면서 이게 실제로 효과가 있다는 걸 확인할 수 있기 때문입니다. 사람들은 최근 2~3년만 보는 경향이 있지만, 일본에서는 업종과 시가총액을 가리지 않고 무엇이 효과가 있었는지에 대한 교훈이 많이 나왔어요. 일본은 그런 청사진이 없었기 때문에 더 혁명적으로 느껴졌던 거고요. 아시아의 여러 나라들이 기업 지배구조 개선이라는 흐름을 따라가고 있는데, 인도 기업들이 소액주주에게 우호적이려는 집단적 의지가 크게 달라진 것도 마찬가지예요. 일본은 20년이 걸렸고 한국은 10년 정도라고 보는데, 한국은 더 빨리 진행될 거예요. 배당 지급과 자사주 매입은 쉽게 실행할 수 있는 것들인데, 실제로 배당을 늘리고 자사주 매입을 늘리는 기업들이 보이고 있고 이건 긍정적인 시작입니다. 국내 연기금, 특히 국민연금(NPS)이 한국 주식시장 최대 투자자인데, 저는 그들도 이런 흐름을 꽤 반길 거라고 봅니다. 그들도 지급해야 할 연금 부채가 있으니, 한국 시장 밸류에이션이 올라가고 배당도 더 받게 된다면 꽤 관심을 가질 거라고 생각합니다." },

const tabsEl = document.getElementById("tabs");
const panelsEl = document.getElementById("panels");

tabsEl.innerHTML = channels.map((c, i) => `
  <button class="tab-btn${i === 0 ? " active" : ""}" data-target="ch-${c.id}">${c.label}</button>
`).join("");

panelsEl.innerHTML = channels.map((c, i) => `
  <div id="ch-${c.id}" class="channel-panel${i === 0 ? " active" : ""}">
    <p class="channel-meta">${c.handle}</p>
    ${c.shorts.map(s => `
      <div class="card">
        <a class="thumb-link" href="https://www.youtube.com/shorts/${s.id}" target="_blank" rel="noopener">
          <img src="https://i.ytimg.com/vi/${s.id}/hqdefault.jpg" alt="${s.title}" loading="lazy">
          <div class="play-badge">▶</div>
        </a>
        <div class="body">
          <div class="title">${s.title}</div>
          <a class="open-link" href="https://www.youtube.com/shorts/${s.id}" target="_blank" rel="noopener">YouTube에서 보기</a>
          <div class="transcript-label">자막 텍스트${s.translated ? '<span class="badge">번역</span>' : ""}</div>
          <div class="transcript">${s.transcript}</div>
        </div>
      </div>
    `).join("")}
  </div>
`).join("");

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".channel-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.target).classList.add("active");
  });
});
</script>
</body>
</html>
