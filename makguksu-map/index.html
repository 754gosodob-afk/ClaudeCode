  { name: "동수리막국수", region: "강원", city: "양구", addr: "강원 양구군 양구읍 파로호로 899", menu: "감자전과 곁들이는 정갈한 막국수", lat: 38.1090, lng: 127.9895 },
  { name: "대동면옥 강릉점", region: "강원", city: "강릉", addr: "강원 강릉시 종합운동장길 26-8", menu: "메밀 함량 높은 투박한 면발", lat: 37.7562, lng: 128.8970 },
  { name: "고기리막국수", region: "경기", city: "용인", addr: "경기 용인시 수지구 이종무로 157", menu: "들기름막국수의 원조격", lat: 37.3227, lng: 127.0980 },
  { name: "성천막국수 답십리본점", region: "서울", city: "동대문구", addr: "서울 동대문구 답십리로48나길 2", menu: "1966년 개업 · 반세기 전통", lat: 37.5711, lng: 127.0517, youtube: "https://www.youtube.com/watch?v=V0QUgTpLTwo" },
  { name: "양양메밀막국수", region: "서울", city: "서초구", addr: "서울 서초구 동광로15길 10", menu: "미쉐린가이드 빕구르망 선정", lat: 37.4835, lng: 127.0142 },
  { name: "춘천막국수", region: "충청", city: "청주(문의면)", addr: "충북 청주시 상당구 문의면 남계2길 7", menu: "대청호 인근 막국수 전문점", lat: 36.5369534, lng: 127.503587 },
  { name: "최고산면옥", region: "경상", city: "대구", addr: "대구 수성구 무학로 125-11", menu: "수성못 인근 물막국수 맛집", lat: 35.8579, lng: 128.6301 },
  { name: "진미면막국수", region: "전라", city: "전주", addr: "전북 전주시 덕진구 석소5길 13", menu: "소화 잘되는 메밀 막국수", lat: 35.8642, lng: 127.1289 },
  { name: "저지면옥", region: "제주", city: "제주", addr: "제주 한경면 저지리", menu: "제주에서 만나는 메밀 막국수", lat: 33.3199, lng: 126.2977 },
];

// 검색엔진용 구조화 데이터 (schema.org ItemList) - places 배열과 자동 동기화
const structuredData = {
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "전국 막국수 지도",
  "itemListElement": places.map((p, i) => ({
    "@type": "ListItem",
    "position": i + 1,
    "item": {
      "@type": "Restaurant",
      "name": p.name,
      "address": p.addr,
      "servesCuisine": "막국수",
      "geo": { "@type": "GeoCoordinates", "latitude": p.lat, "longitude": p.lng },
    },
  })),
};
const ldScript = document.createElement("script");
ldScript.type = "application/ld+json";
ldScript.textContent = JSON.stringify(structuredData);
document.head.appendChild(ldScript);

const DEFAULT_VIEW = [36.3, 127.9];
const DEFAULT_ZOOM = 7;

const map = L.map("map").setView(DEFAULT_VIEW, DEFAULT_ZOOM);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
}).addTo(map);

// 지역별 레이어 그룹: 탭 전환 시 해당 지역 핀만 지도에 표시
const regionLayers = {};
regionOrder.forEach(r => { regionLayers[r] = L.layerGroup(); });

const markerByIndex = [];
places.forEach((p, i) => {
  const color = regions[p.region];
  const mapUrl = "https://map.naver.com/p/search/" + encodeURIComponent(p.addr + " " + p.name);

  const marker = L.circleMarker([p.lat, p.lng], {
    radius: 8,
    color: "#ffffff",
    weight: 2,
    fillColor: color,
    fillOpacity: 1,
  });
  marker.bindPopup(
    `<div class="popup-name">${p.name}</div><div class="popup-addr">${p.addr}</div><a class="popup-link" href="${mapUrl}" target="_blank" rel="noopener">네이버 지도에서 보기 →</a>`
  );
  marker.addTo(regionLayers[p.region]);
  markerByIndex[i] = marker;
});

regionOrder.forEach(r => regionLayers[r].addTo(map));

function focusMarker(p, marker) {
  map.setView([p.lat, p.lng], 12, { animate: true });
  marker.openPopup();
  document.getElementById("map").scrollIntoView({ behavior: "smooth", block: "center" });
}

function buildCard(p, i) {
  const mapUrl = "https://map.naver.com/p/search/" + encodeURIComponent(p.addr + " " + p.name);
  const ytBtn = p.youtube
    ? `<a class="yt-btn" href="${p.youtube}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        영상
      </a>`
    : "";
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-row">
      <div class="info">
        <div class="name">${p.name}</div>
        <div class="meta">${p.city}<br>${p.addr}</div>
        <div class="menu-tag">${p.menu}</div>
      </div>
      <div class="btn-col">
        <a class="map-btn" href="${mapUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-7-6.1-7-11a7 7 0 0 1 14 0c0 4.9-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>
          지도
        </a>
        ${ytBtn}
      </div>
    </div>
  `;
  card.addEventListener("click", () => focusMarker(p, markerByIndex[i]));
  return card;
}

const panelsEl = document.getElementById("panels");

// "전체" 패널: 지역별 헤딩으로 그룹핑해서 전부 표시
const allPanel = document.createElement("div");
allPanel.className = "region-panel active";
allPanel.id = "panel-all";
let lastRegion = null;
places.forEach((p, i) => {
  if (p.region !== lastRegion) {
    const heading = document.createElement("div");
    heading.className = "region-heading";
    heading.innerHTML = `<span class="dot" style="background:${regions[p.region]}"></span>${p.region}`;
    allPanel.appendChild(heading);
    lastRegion = p.region;
  }
  allPanel.appendChild(buildCard(p, i));
});
panelsEl.appendChild(allPanel);

// 지역별 패널: 해당 지역 카드만 표시
regionOrder.forEach(region => {
  const panel = document.createElement("div");
  panel.className = "region-panel";
  panel.id = "panel-" + region;
  places.forEach((p, i) => {
    if (p.region === region) panel.appendChild(buildCard(p, i));
  });
  panelsEl.appendChild(panel);
});

// 탭 렌더링: 전체 + 지역별 (개수 표시)
const tabsEl = document.getElementById("tabs");
const counts = { all: places.length };
regionOrder.forEach(r => { counts[r] = places.filter(p => p.region === r).length; });

const tabDefs = [{ key: "all", label: "전체", color: null }, ...regionOrder.map(r => ({ key: r, label: r, color: regions[r] }))];
tabsEl.innerHTML = tabDefs.map(t => `
  <button class="tab-btn${t.key === "all" ? " active" : ""}" data-target="${t.key}">
    ${t.color ? `<span class="dot" style="background:${t.color}"></span>` : ""}${t.label} (${counts[t.key]})
  </button>
`).join("");

function setActiveRegion(key) {
  regionOrder.forEach(r => map.removeLayer(regionLayers[r]));
  if (key === "all") {
    regionOrder.forEach(r => regionLayers[r].addTo(map));
    map.setView(DEFAULT_VIEW, DEFAULT_ZOOM, { animate: true });
  } else {
    regionLayers[key].addTo(map);
    const bounds = regionLayers[key].getLayers().map(m => m.getLatLng());
    if (bounds.length === 1) {
      map.setView(bounds[0], 12, { animate: true });
    } else if (bounds.length > 1) {
      map.fitBounds(L.latLngBounds(bounds), { padding: [30, 30] });
    }
  }
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".region-panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.target).classList.add("active");
    setActiveRegion(btn.dataset.target);
  });
});
</script>
</body>
</html>
